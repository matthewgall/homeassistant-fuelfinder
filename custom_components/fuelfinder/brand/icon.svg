<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Background circle -->
  <circle cx="12" cy="12" r="11" fill="#007cbf"/>

  <!-- Fuel pump body -->
  <rect x="8" y="4" width="8" height="13" rx="1.5" fill="#ffffff" stroke="none"/>

  <!-- Top cap -->
  <rect x="9" y="3" width="6" height="1.5" rx="0.5" fill="#e0e0e0" stroke="none"/>

  <!-- Display screen -->
  <rect x="9.5" y="6" width="5" height="2.5" rx="0.4" fill="#007cbf" stroke="none" opacity="0.15"/>
  <!-- Price digits on screen -->
  <rect x="10" y="6.7" width="0.9" height="0.9" rx="0.15" fill="#007cbf" stroke="none"/>
  <rect x="11.5" y="6.7" width="0.9" height="0.9" rx="0.15" fill="#007cbf" stroke="none"/>
  <rect x="13" y="6.7" width="0.9" height="0.9" rx="0.15" fill="#007cbf" stroke="none"/>

  <!-- Hose (curved on right side, compact) -->
  <path d="M 16 7.5 C 17.5 7.5, 17.5 11.5, 16 11.5" fill="none" stroke="#333333" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Nozzle -->
  <rect x="15" y="11.5" width="2.5" height="1.5" rx="0.3" fill="#555555" stroke="none"/>
  <rect x="15" y="12" width="0.9" height="0.7" rx="0.15" fill="#333333" stroke="none"/>

  <!-- Base / stand -->
  <rect x="7" y="16.5" width="10" height="1.5" rx="0.4" fill="#333333" stroke="none"/>

  <!-- Green drop icon on body -->
  <path d="M 12 9.5 C 12 9.5, 10.8 10.8, 10.8 11.8 C 10.8 12.6, 11.3 13.2, 12 13.2 C 12.7 13.2, 13.2 12.6, 13.2 11.8 C 13.2 10.8, 12 9.5, 12 9.5 Z" fill="#00c851" stroke="none"/>
</svg>
